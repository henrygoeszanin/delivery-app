services:
  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  postgres-orders:
    image: postgres:16
    environment:
      POSTGRES_DB: orders
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: postgres
    ports: ["5432:5432"]

  postgres-inventory:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: postgres
    ports: ["5433:5432"]
